name: GitHub-Profile-3D-Contrib

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    steps:
      - uses: actions/checkout@v3
      - uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
          SETTING_JSON: '{"type":"normal","fileName":"profile-3d-contrib/normal.svg","backgroundColor":"#0d1117","foregroundColor":"#ffffff","strongColor":"#58a6ff","weakColor":"#8b949e","radarColor":"#58a6ff","growingAnimation":true,"contribColors":["#161b22","#0e4429","#006d32","#26a641","#39d353"]}'
      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A .
          git commit -m "Generated 3D contribution graph" || true
          git push || true
